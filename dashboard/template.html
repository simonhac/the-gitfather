<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>__TITLE__</title>
<style>
  :root { --fg:#1f2430; --muted:#6b7280; --border:#e4e7ec; --bg:#ffffff; --card:#ffffff; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #app { max-width: 1220px; margin: 0 auto; padding: 32px 24px 64px; }
  .header h1 { margin: 0 0 4px; font-size: 22px; font-weight: 650; }
  .subtitle { margin: 0; max-width: 760px; color: var(--muted); }
  .stats { display: flex; flex-wrap: wrap; gap: 12px; margin: 24px 0; }
  .stat { border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; min-width: 96px; }
  .stat-label { font-size: 12px; color: var(--muted); }
  .stat-value { font-size: 18px; font-weight: 650; font-variant-numeric: tabular-nums; }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin: 8px 0 20px; font-size: 12px; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .scroll { overflow-x: auto; padding-bottom: 8px; }
  .heatmap { display: block; }
  .footer { margin-top: 20px; font-size: 12px; color: var(--muted); }
  .tip {
    position: fixed; z-index: 50; pointer-events: none; max-width: 240px;
    background: #fff; color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font-size: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
  }
  .tip-when { font-weight: 600; margin-bottom: 3px; }
  .tip-state { display: flex; align-items: center; gap: 6px; }
  .tip-muted { color: var(--muted); margin-top: 2px; }
  .tip-fail { color: #c8392e; margin-top: 2px; }
  .tip-hint { color: #9aa1ad; margin-top: 4px; }
  .dot { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
  @media (prefers-color-scheme: dark) {
    :root { --fg:#e6e8eb; --muted:#9aa1ad; --border:#2a2f3a; --bg:#15181e; --card:#1b1f27; }
    .tip { background: #1b1f27; }
  }
</style>
</head>
<body>
  <main id="app"></main>
  <script id="backup-data" type="application/json">__DATA__</script>
  <script>__BUNDLE__</script>
</body>
</html>
