<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>__TITLE__</title>
<style>
  :root {
    --fg:#181c24; --muted:#677085; --border:#e7e9ef; --bg:#f7f8fa; --card:#ffffff;
    --accent:#1f8a54; --shadow:0 1px 2px rgba(16,24,40,0.04), 0 4px 16px rgba(16,24,40,0.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  #app { max-width: 1220px; margin: 0 auto; padding: 40px 28px 72px; }
  .header h1 { margin: 0 0 6px; font-size: 26px; font-weight: 680; letter-spacing: -0.01em; }
  .subtitle { margin: 0; max-width: 780px; color: var(--muted); font-size: 14px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 28px 0 22px; }
  @media (max-width: 760px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    background: var(--card); border: 1px solid var(--border); border-radius: 7px;
    padding: 12px 15px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; justify-content: center; min-height: 66px;
    transition: box-shadow 0.16s ease, transform 0.16s ease;
  }
  .stat:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(16,24,40,0.08), 0 14px 30px rgba(16,24,40,0.10); }
  .stat-label { font-size: 11px; font-weight: 550; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); white-space: nowrap; }
  .stat-value { margin-top: 4px; font-size: 21px; font-weight: 680; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; line-height: 1.15; }
  .stat-value.text { font-size: 15px; font-weight: 650; letter-spacing: 0; }
  .stat-value.pos { color: var(--accent); }
  .stat-value.bad { color: #d4493f; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 20px 12px; box-shadow: var(--shadow);
  }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin: 0 0 14px; font-size: 12px; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .scroll { overflow-x: auto; padding-bottom: 6px; }
  .heatmap { display: block; }
  .footer { margin-top: 18px; font-size: 12px; color: var(--muted); }
  .tip {
    position: fixed; z-index: 50; pointer-events: none; max-width: 248px;
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 11px; font-size: 12px; line-height: 1.45;
    box-shadow: 0 8px 28px rgba(16,24,40,0.16);
  }
  .tip-when { font-weight: 620; margin-bottom: 3px; }
  .tip-state { display: flex; align-items: center; gap: 6px; }
  .tip-muted { color: var(--muted); margin-top: 2px; }
  .tip-fail { color: #d4493f; margin-top: 2px; }
  .tip-hint { color: var(--muted); opacity: 0.8; margin-top: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 2px; display: inline-block; flex: none; }
  .tip.pinned { pointer-events: auto; }
  .tip-link, .tip-row { display: flex; align-items: center; gap: 6px; margin: 2px -6px 0; padding: 5px 6px; border-radius: 7px; }
  .tip-link { color: inherit; text-decoration: none; cursor: pointer; }
  .tip-link:hover { background: rgba(127,127,127,0.14); }
  .tip-run-label { flex: 1; }
  .tip-go { color: var(--muted); flex: none; }
  .tip-nolink { font-size: 11px; opacity: 0.7; }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg:#e7e9ee; --muted:#949cad; --border:#2a2f3a; --bg:#101319; --card:#1a1e26;
      --accent:#34c878; --shadow:0 1px 2px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.4);
    }
  }
</style>
</head>
<body>
  <main id="app"></main>
  <script id="backup-data" type="application/json">__DATA__</script>
  <script>__BUNDLE__</script>
</body>
</html>
