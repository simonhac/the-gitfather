name: pg-dashboard (reusable)

# Reusable: render the static backup-history dashboard from the private R2 run-logs and publish the
# (scrubbed) index.html to the PUBLIC dashboard bucket. A consuming repo typically calls this from a
# caller workflow triggered `on: workflow_run` after its backup workflow completes.

on:
  workflow_call:
    inputs:
      profile:
        description: "Path (within the CALLER repo) to the profile .yaml (for name / dashboard.label / timezone)."
        type: string
        required: true
      gitfather_ref:
        type: string
        required: false
        default: main
      r2_bucket:
        description: "Private R2 dump bucket name to read logs from (caller passes vars.R2_BUCKET)."
        type: string
        required: true
      dashboard_r2_bucket:
        description: "Public R2 dashboard bucket name to write index.html to (caller passes vars.DASHBOARD_R2_BUCKET)."
        type: string
        required: true
    # Secrets passed EXPLICITLY by the caller (inherit only works same-org/enterprise; this repo is
    # owned by a different account than its consumers). Non-secret config is threaded via inputs.
    secrets:
      R2_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:                 # private dump bucket — read the logs
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      DASHBOARD_R2_ACCESS_KEY_ID:       # public dashboard bucket — write index.html
        required: true
      DASHBOARD_R2_SECRET_ACCESS_KEY:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout caller repo (holds the profile)
        uses: actions/checkout@v4
        with:
          path: caller

      - name: Checkout the-gitfather (holds the scripts)
        uses: actions/checkout@v4
        with:
          repository: simonhac/the-gitfather
          ref: ${{ inputs.gitfather_ref }}
          path: engine

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: engine/package-lock.json

      - uses: ./engine/.github/actions/setup-tools

      - name: Build + publish dashboard
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ inputs.r2_bucket }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          DASHBOARD_R2_BUCKET: ${{ inputs.dashboard_r2_bucket }}
          DASHBOARD_R2_ACCESS_KEY_ID: ${{ secrets.DASHBOARD_R2_ACCESS_KEY_ID }}
          DASHBOARD_R2_SECRET_ACCESS_KEY: ${{ secrets.DASHBOARD_R2_SECRET_ACCESS_KEY }}
          PROFILE: ${{ github.workspace }}/caller/${{ inputs.profile }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          # `r2` = private dump bucket (read the logs); `r2dash` = public dashboard bucket (write index.html).
          export RCLONE_CONFIG_R2_TYPE=s3 RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
            RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            RCLONE_CONFIG_R2_ENDPOINT="$ENDPOINT"
          export RCLONE_CONFIG_R2DASH_TYPE=s3 RCLONE_CONFIG_R2DASH_PROVIDER=Cloudflare \
            RCLONE_CONFIG_R2DASH_ACCESS_KEY_ID="$DASHBOARD_R2_ACCESS_KEY_ID" \
            RCLONE_CONFIG_R2DASH_SECRET_ACCESS_KEY="$DASHBOARD_R2_SECRET_ACCESS_KEY" \
            RCLONE_CONFIG_R2DASH_ENDPOINT="$ENDPOINT"
          # build-dashboard.ts reads $PROFILE (YAML) directly for the label + timezone — no sourcing needed.
          cd engine
          npm ci
          npx tsx scripts/build-dashboard.ts --upload
