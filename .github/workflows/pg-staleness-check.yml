name: pg-staleness-check (reusable)

# Reusable hourly assertion that a fresh backup landed in R2. Alerts 🔴 if the newest 2hourly/ object
# is older than STALE_HOURS, and self-heals a *missed* tick by re-triggering the backup workflow.
# Complements the backup's dead-man's-switch ping (object-landed vs run-succeeded). See README.

on:
  workflow_call:
    inputs:
      profile:
        description: "Path (within the CALLER repo) to the profile .env."
        type: string
        required: true
      gitfather_ref:
        type: string
        required: false
        default: main
      backup_workflow:
        description: "Caller's backup workflow file name, re-triggered on a missed tick."
        type: string
        required: false
        default: pg-backup.yml
      r2_bucket:
        description: "Private R2 dump bucket name (caller passes vars.R2_BUCKET)."
        type: string
        required: true
      slack_channel:
        description: "Slack channel id (caller passes vars.SLACK_CHANNEL); empty disables Slack."
        type: string
        required: false
        default: ""
    # Secrets passed EXPLICITLY by the caller (inherit only works same-org/enterprise; this repo is
    # owned by a different account than its consumers). Non-secret config is threaded via inputs.
    secrets:
      R2_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      SLACK_BOT_TOKEN:
        required: false
      ALERT_WEBHOOK_URL:   # optional generic failure webhook (Slack-compatible); redundant to the bot
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # actions:write lets the staleness check self-heal a *missed* backup by re-triggering the caller's
    # backup workflow via `gh workflow run`. Capped by the caller's grant — the caller must also grant it.
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout caller repo (holds the profile)
        uses: actions/checkout@v4
        with:
          path: caller

      - name: Checkout the-gitfather (holds the scripts)
        uses: actions/checkout@v4
        with:
          repository: simonhac/the-gitfather
          ref: ${{ inputs.gitfather_ref }}
          path: engine

      - uses: ./engine/.github/actions/setup-tools

      - name: Staleness check
        env:
          PROFILE: ${{ github.workspace }}/caller/${{ inputs.profile }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ inputs.r2_bucket }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
          BACKUP_WORKFLOW: ${{ inputs.backup_workflow }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}   # self-heal: `gh workflow run <backup_workflow>` on a missed tick
        run: bash engine/scripts/check-staleness.sh
